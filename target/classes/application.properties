# Spring Application Settings
spring.application.name=bookbridge-backend
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/bookbridge?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configurations (Minimum 256-bit secure key)
bookbridge.jwt.secret=9a67471ec63943fcf3e843232810fb5cfbb7a67bb1d7fbbd867c4dfcdbf402a4
bookbridge.jwt.expirationMs=86400000

# Razorpay Mock & Integration Settings
razorpay.key.id=rzp_test_mockKeyId123456789
razorpay.key.secret=mockSecretKey9876543210
razorpay.mode=mock

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
